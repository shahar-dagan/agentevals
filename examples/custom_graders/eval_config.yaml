# Example eval config using a custom code-based grader alongside built-in ones.
#
# Run with:
#   agentevals run samples/helm.json \
#     --config examples/custom_graders/eval_config.yaml \
#     --eval-set samples/eval_set_helm.json

metrics:
  # Built-in metric (unchanged)
  - tool_trajectory_avg_score

  # Custom code graders (local scripts)
  - name: tool_call_checker
    type: code
    path: ./examples/custom_graders/tool_call_checker.py
    threshold: 1.0
    config:
      min_tool_calls: 1

  - name: response_quality
    type: code
    path: ./examples/custom_graders/response_quality.py
    threshold: 0.7
    config:
      min_response_length: 20

  # refrence a grader from Github
  - name: peters_grader
    type: remote
    source: github
    ref: graders/peters_grader/peters_grader.py
    threshold: 0.110
    executor: local